<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Signing in… – ywiki</title>
</head>
<body>
  <p id="msg">Signing you in…</p>
  <script>
    (function () {
      function parseParams(str) {
        var p = {};
        if (!str) return p;
        str.replace(/^#?\/?/, '').split('&').forEach(function (s) {
          var kv = s.split('=');
          if (kv.length >= 2) p[decodeURIComponent(kv[0])] = decodeURIComponent(kv.slice(1).join('=').replace(/\+/g, ' '));
        });
        return p;
      }
      var hash = parseParams(window.location.hash);
      var query = parseParams(window.location.search);
      var token = hash.id_token || query.id_token || null;
      var error = hash.error || query.error || null;
      var errorDesc = hash.error_description || query.error_description || '';

      if (token) {
        sessionStorage.setItem('ywiki_id_token', token);
        try {
          var pl = JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
          sessionStorage.setItem('ywiki_user', pl.email || pl['cognito:username'] || pl.sub || '');
        } catch (e) {}
        window.location.replace(window.location.origin + '/static/index.html');
        return;
      }

      var msg = document.getElementById('msg');
      if (error) {
        msg.innerHTML = '<p><strong>Sign-in error:</strong> ' + (errorDesc || error) + '</p>' +
          '<p><strong>Callback URL</strong> must include:<br><code>http://localhost:8080/static/callback.html</code></p>' +
          '<p>If the error is <code>invalid_scope</code>: In Cognito → App integration → App client → Hosted UI, enable <strong>Allowed OAuth scopes</strong> at least <code>openid</code> (optionally <code>email</code>, <code>profile</code>) and enable an OAuth flow (for this app, <strong>Implicit grant</strong> works).</p>' +
          '<p><a href="index.html">Back to wiki</a></p>';
      } else {
        msg.innerHTML = '<p>No token received. Cognito may have redirected with an error or the callback URL may not match.</p>' +
          '<p>Expected callback URL: <code>http://localhost:8080/static/callback.html</code></p>' +
          '<p><a href="index.html">Back to wiki</a></p>';
      }
    })();
  </script>
</body>
</html>
